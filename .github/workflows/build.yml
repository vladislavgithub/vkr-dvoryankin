name: Build PDF

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live + biber
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-lang-cyrillic \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-bibtex-extra \
            texlive-latex-extra \
            texlive-science \
            biber \
            latexmk

      - name: Compile LaTeX
        run: |
          latexmk -pdf -pdflatex='xelatex -interaction=nonstopmode -shell-escape' -file-line-error main.tex || true
          ls -la main.pdf

      - name: Update latest release via API
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          # удалить старый asset если есть
          ASSET_URL=$(curl -fsSL -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/latest" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); a=[x for x in d.get('assets',[]) if x['name']=='vkr-dvoryankin.pdf']; print(a[0]['url'] if a else '')")
          if [ -n "$ASSET_URL" ]; then
            curl -fsSL -X DELETE -H "Authorization: token $GH_TOKEN" "$ASSET_URL"
          fi
          # получить upload_url
          UPLOAD_URL=$(curl -fsSL -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/latest" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['upload_url'].split('{')[0])")
          # обновить тело release
          REL_ID=$(curl -fsSL -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/latest" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          curl -fsSL -X PATCH -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"body\":\"Свежий PDF магистерской работы. Коммит: $SHA\"}" \
            "https://api.github.com/repos/$REPO/releases/$REL_ID" > /dev/null
          # загрузить новый PDF
          curl -fsSL -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/pdf" \
            --data-binary @main.pdf \
            "${UPLOAD_URL}?name=vkr-dvoryankin.pdf" > /dev/null
          echo "Uploaded vkr-dvoryankin.pdf to release 'latest'"
