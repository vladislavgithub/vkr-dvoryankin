name: Build PDF

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # нужно для публикации Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live + biber
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-lang-cyrillic \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-bibtex-extra \
            texlive-latex-extra \
            texlive-science \
            biber \
            latexmk

      - name: Compile LaTeX (xelatex + biber)
        run: |
          latexmk -pdf -pdflatex='xelatex -interaction=nonstopmode -shell-escape' -file-line-error main.tex || true
          ls -la main.pdf

      - name: Rename PDF
        run: |
          DATE=$(date +%Y-%m-%d)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          mkdir -p out
          cp main.pdf out/vkr-dvoryankin.pdf
          cp main.pdf out/vkr-dvoryankin-${DATE}-${SHA}.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: vkr-dvoryankin-pdf
          path: out/*.pdf
          retention-days: 90

      - name: Update rolling release (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          body: |
            Свежий PDF магистерской работы.
            Коммит: ${{ github.sha }}
            Сообщение: ${{ github.event.head_commit.message }}
          files: out/vkr-dvoryankin.pdf
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
