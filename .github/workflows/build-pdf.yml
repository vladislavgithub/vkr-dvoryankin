name: Build PDF

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX (xelatex + biber)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          latexmk_shell_escape: true
          extra_system_packages: |
            inkscape
          pre_compile: |
            mkdir -p /root/.fonts
            cp -r fonts/* /root/.fonts/ 2>/dev/null || true
            fc-cache -fv

      - name: Rename PDF
        run: |
          DATE=$(date +%Y-%m-%d)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          mkdir -p out
          cp main.pdf out/vkr-dvoryankin.pdf
          cp main.pdf out/vkr-dvoryankin-${DATE}-${SHA}.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: vkr-dvoryankin-pdf
          path: out/*.pdf
          retention-days: 90

      - name: Update rolling release (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          body: |
            Свежий PDF магистерской работы.
            Коммит: ${{ github.sha }}
            Сообщение: ${{ github.event.head_commit.message }}
          files: out/vkr-dvoryankin.pdf
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
